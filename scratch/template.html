
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<script src=\"63149716-fc15-412b-ac9f-1c77063811d0\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"b608c6e9-1067-4563-ab93-d0578015628e\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"231b2dfc-87ec-4551-8079-837156d2d5c9\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"7f88b208-bbc5-4f49-a125-0375d0a3691a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"b608c6e9-1067-4563-ab93-d0578015628e\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"231b2dfc-87ec-4551-8079-837156d2d5c9\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"7f88b208-bbc5-4f49-a125-0375d0a3691a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:#178BCB;overflow:hidden}\n  @keyframes rayBurst{0%{opacity:0;transform:scale(.2) rotate(0deg)}30%{opacity:.7}100%{opacity:0;transform:scale(1.8) rotate(38deg)}}\n  @keyframes logoSnap{0%{opacity:0;transform:scale(.35) rotate(-6deg)}45%{opacity:1}60%{transform:scale(1.1) rotate(2deg)}74%{transform:scale(.97) rotate(-1deg)}88%{transform:scale(1.02) rotate(0deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}\n  @keyframes particleConverge{0%{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(.35);opacity:0}16%{opacity:1}52%{transform:translate(-50%,-50%) scale(1.15);opacity:1}100%{transform:translate(calc(-50% + var(--ox)), calc(-50% + var(--oy))) scale(.12);opacity:0}}\n  @keyframes streakConverge{0%{transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot)) scaleX(.5);opacity:0}20%{opacity:.95}52%{transform:translate(-50%,-50%) rotate(var(--rot)) scaleX(1);opacity:.95}100%{transform:translate(calc(-50% + var(--ox)), calc(-50% + var(--oy))) rotate(var(--rot)) scaleX(.35);opacity:0}}\n  @keyframes shockwave{0%{opacity:0;transform:scale(.25)}22%{opacity:.9}100%{opacity:0;transform:scale(2.8)}}\n  @keyframes impactFlash{0%{opacity:0;transform:scale(.2)}38%{opacity:.95}100%{opacity:0;transform:scale(1.7)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:fixed;inset:0;font-family:'Space Grotesk',system-ui,sans-serif\">\n  <div style=\"position:absolute;inset:0\">{{ scene }}<\u002Fdiv>\n  <button onclick=\"{{ replay }}\" style=\"position:absolute;bottom:22px;right:22px;z-index:2;display:inline-flex;align-items:center;gap:7px;padding:10px 17px;border-radius:999px;border:1.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.12);backdrop-filter:blur(6px);color:#fff;font:600 14px 'Space Grotesk',sans-serif;cursor:pointer\" style-hover=\"background:rgba(255,255,255,.24)\">↻ Repetir<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FF8A2B&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#FF8A2B&quot;,&quot;#FF6A00&quot;,&quot;#FFB300&quot;,&quot;#FF4D6D&quot;]},&quot;celeste&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#36AEE7&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#36AEE7&quot;,&quot;#1FA0DC&quot;,&quot;#23C3E8&quot;,&quot;#4FB8E8&quot;]}}\">\nclass Component extends DCLogic {\n  state = { run: 0, settled: false };\n  timer = null;\n\n  componentDidMount() { this.scheduleSettle(); }\n  componentWillUnmount() { clearTimeout(this.timer); }\n\n  scheduleSettle() {\n    clearTimeout(this.timer);\n    this.timer = setTimeout(() => this.setState({ settled: true }), 2500);\n  }\n\n  replay() { this.setState(s => ({ run: s.run + 1, settled: false })); this.scheduleSettle(); }\n\n  buildScene(runId, settled) {\n    const h = React.createElement;\n    const src = (window.__resources && window.__resources.logo) || 'alumni-ucr.png';\n    const accent = this.props.accent || '#FF8A2B';\n    const celeste = this.props.celeste || '#36AEE7';\n    const acc = (a) => `color-mix(in srgb, ${accent} ${a}%, transparent)`;\n    const accLight = `color-mix(in srgb, ${accent}, white 22%)`;\n    const stageBg = `radial-gradient(125% 120% at 50% 40%, color-mix(in srgb, ${celeste}, white 42%) 0%, ${celeste} 52%, color-mix(in srgb, ${celeste}, #00425f 34%) 100%)`;\n    const shadow = 'drop-shadow(0 12px 30px rgba(6,55,85,.32))';\n    const orangeGlow = `drop-shadow(0 0 16px ${acc(50)})`;\n    const rootStyle = { position: 'absolute', inset: 0, overflow: 'hidden', background: stageBg, display: 'flex', alignItems: 'center', justifyContent: 'center', containerType: 'size' };\n    const logo = (style) => h('img', { key: 'img', src, style: { width: '100%', display: 'block', ...style } });\n    const logoW = '34cqmin';\n\n    if (settled) {\n      return h('div', { key: 'settled', style: rootStyle },\n        h('div', { style: { position: 'relative', width: logoW, filter: shadow } }, logo()));\n    }\n\n    const dots = [];\n    for (let i = 0; i < 26; i++) {\n      const a = Math.random() * Math.PI * 2;\n      const d = 26 + Math.random() * 22;\n      const dx = (Math.cos(a) * d).toFixed(1) + 'cqw';\n      const dy = (Math.sin(a) * d).toFixed(1) + 'cqh';\n      const oa = a + (Math.random() - 0.5) * 0.7;\n      const od = d * (1.4 + Math.random() * 0.9);\n      const ox = (Math.cos(oa) * od).toFixed(1) + 'cqw';\n      const oy = (Math.sin(oa) * od).toFixed(1) + 'cqh';\n      const sz = (0.5 + Math.random() * 1.1).toFixed(2) + 'cqmin';\n      const isOrange = i % 4 !== 0;\n      const col = isOrange ? (i % 2 ? accent : `color-mix(in srgb, ${accent}, white 28%)`) : '#ffffff';\n      const delay = (Math.random() * 0.14).toFixed(3);\n      dots.push(h('div', { key: 'd' + i, style: { position: 'absolute', top: '50%', left: '50%', width: sz, height: sz, borderRadius: '50%', background: col, boxShadow: `0 0 10px ${isOrange ? acc(85) : 'rgba(255,255,255,.9)'}`, '--dx': dx, '--dy': dy, '--ox': ox, '--oy': oy, animation: `particleConverge .9s cubic-bezier(.5,0,.5,1) ${delay}s both` } }));\n    }\n    const streaks = [];\n    for (let i = 0; i < 11; i++) {\n      const a = Math.random() * Math.PI * 2;\n      const d = 24 + Math.random() * 20;\n      const dx = (Math.cos(a) * d).toFixed(1) + 'cqw';\n      const dy = (Math.sin(a) * d).toFixed(1) + 'cqh';\n      const od = d * (1.6 + Math.random() * 0.8);\n      const ox = (Math.cos(a) * od).toFixed(1) + 'cqw';\n      const oy = (Math.sin(a) * od).toFixed(1) + 'cqh';\n      const rot = (a * 180 / Math.PI).toFixed(1) + 'deg';\n      const len = (3.5 + Math.random() * 4).toFixed(2) + 'cqmin';\n      const isOrange = i % 3 !== 0;\n      const col = isOrange ? accent : '#ffffff';\n      const delay = (Math.random() * 0.12).toFixed(3);\n      streaks.push(h('div', { key: 's' + i, style: { position: 'absolute', top: '50%', left: '50%', width: len, height: '0.4cqmin', borderRadius: '1cqmin', background: `linear-gradient(90deg, ${isOrange ? acc(0) : 'rgba(255,255,255,0)'}, ${col})`, boxShadow: `0 0 8px ${isOrange ? acc(70) : 'rgba(255,255,255,.8)'}`, '--dx': dx, '--dy': dy, '--ox': ox, '--oy': oy, '--rot': rot, animation: `streakConverge .9s cubic-bezier(.5,0,.5,1) ${delay}s both` } }));\n    }\n\n    return h('div', { key: 'run-' + runId, style: rootStyle }, [\n      h('div', { key: 'rays', style: { position: 'absolute', width: '52%', aspectRatio: '1', borderRadius: '50%', background: `repeating-conic-gradient(from 0deg, ${acc(55)} 0deg 4deg, ${acc(0)} 4deg 16deg)`, mixBlendMode: 'screen', WebkitMaskImage: 'radial-gradient(circle, #000 24%, transparent 64%)', maskImage: 'radial-gradient(circle, #000 24%, transparent 64%)', animation: 'rayBurst .85s ease-out .5s both' } }),\n      h('div', { key: 'shock', style: { position: 'absolute', width: '14%', aspectRatio: '1', borderRadius: '50%', border: `2px solid ${acc(85)}`, animation: 'shockwave .85s cubic-bezier(.15,.7,.3,1) .52s both' } }),\n      ...streaks,\n      ...dots,\n      h('div', { key: 'flash', style: { position: 'absolute', width: '26%', aspectRatio: '1', borderRadius: '50%', background: `radial-gradient(circle, ${accLight} 0%, ${acc(0)} 62%)`, mixBlendMode: 'screen', animation: 'impactFlash .5s ease-out .48s both' } }),\n      h('div', { key: 'wrap', style: { position: 'relative', width: logoW, animation: 'logoSnap 1s cubic-bezier(.18,.85,.25,1) .52s both', filter: shadow + ' ' + orangeGlow } }, logo())\n    ]);\n  }\n\n  renderVals() {\n    const { run, settled } = this.state;\n    return {\n      scene: this.buildScene(run, settled),\n      replay: () => this.replay()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
