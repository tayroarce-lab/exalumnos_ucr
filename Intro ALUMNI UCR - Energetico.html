<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Bundled Page</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #36AEE7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #__bundler_loading {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font: 13px/1.4 -apple-system, BlinkMacSystemFont, sans-serif;
      color: #666;
      background: #fff;
      padding: 8px 14px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      z-index: 10000;
    }

    #__bundler_thumbnail {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #36AEE7;
      z-index: 9999;
    }

    #__bundler_thumbnail svg {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    #__bundler_placeholder {
      color: #999;
      font-size: 14px;
    }
  </style>
  <noscript>
    <style>
      #__bundler_loading {
        display: none;
      }
    </style>
    <div
      style="position:fixed;bottom:12px;left:12px;font:13px/1.4 -apple-system,BlinkMacSystemFont,sans-serif;color:#999;background:rgba(255,255,255,0.9);padding:6px 12px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:10000;">
      This page requires JavaScript to display.
    </div>
  </noscript>
</head>

<body>
  <div id="__bundler_thumbnail">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#36AEE7"></rect>
      <circle cx="600" cy="400" r="150" fill="none" stroke="#FF8A2B" stroke-width="14"></circle>
      <circle cx="600" cy="400" r="40" fill="#ffffff"></circle>
      <g stroke="#ffffff" stroke-width="10" stroke-linecap="round">
        <line x1="600" y1="400" x2="600" y2="180"></line>
        <line x1="600" y1="400" x2="820" y2="400"></line>
        <line x1="600" y1="400" x2="380" y2="400"></line>
        <line x1="600" y1="400" x2="600" y2="620"></line>
      </g>
    </svg>
  </div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>

    document.addEventListener('DOMContentLoaded', async function () {
      const loading = document.getElementById('__bundler_loading');
      function setStatus(msg) { if (loading) loading.textContent = msg; }

      // Error sink persists across replaceWith since it's on window, not the DOM.
      window.addEventListener('error', function (e) {
        var p = document.body || document.documentElement;
        var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
        d.id = '__bundler_err';
        d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
        d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
          '[bundle] ' + (e.message || e.type) +
          (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
      }, true);

      try {
        const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
        const templateEl = document.querySelector('script[type="__bundler/template"]');
        if (!manifestEl || !templateEl) {
          setStatus('Error: missing bundle data');
          console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
          return;
        }

        const manifest = JSON.parse(manifestEl.textContent);
        let template = JSON.parse(templateEl.textContent);

        const uuids = Object.keys(manifest);
        setStatus('Unpacking ' + uuids.length + ' assets...');

        const blobUrls = {};
        await Promise.all(uuids.map(async (uuid) => {
          const entry = manifest[uuid];
          try {
            const binaryStr = atob(entry.data);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            let finalBytes = bytes;
            if (entry.compressed) {
              if (typeof DecompressionStream !== 'undefined') {
                const ds = new DecompressionStream('gzip');
                const writer = ds.writable.getWriter();
                const reader = ds.readable.getReader();
                writer.write(bytes);
                writer.close();
                const chunks = [];
                let totalLen = 0;
                while (true) {
                  const { done, value } = await reader.read();
                  if (done) break;
                  chunks.push(value);
                  totalLen += value.length;
                }
                finalBytes = new Uint8Array(totalLen);
                let offset = 0;
                for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
              } else {
                console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
              }
            }

            blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
          } catch (err) {
            console.error('Failed to decode asset ' + uuid + ':', err);
            blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
          }
        }));

        const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
        const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
        const resourceMap = {};
        for (const entry of extResources) {
          if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
        }

        setStatus('Rendering...');
        for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

        // Strip integrity + crossorigin — blob URLs from a file:// document inherit
        // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
        // The manifest bytes are ours; SRI protects against CDN compromise, not this.
        template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

        const resourceScript = '<script>window.__resources = ' +
          JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
          ';</' + 'script>';
        // Inject after <head> so the DOCTYPE stays first; prepending the script
        // would push the parser into quirks mode. DOMParser always emits a <head>
        // (synthesizing one if the source HTML omitted it) but may carry
        // attributes through, so match the full opening tag. slice() rather than
        // replace() keeps us clear of $-pattern substitution in resourceScript.
        const headOpen = template.match(/<head[^>]*>/i);
        if (headOpen) {
          const i = headOpen.index + headOpen[0].length;
          template = template.slice(0, i) + resourceScript + template.slice(i);
        }

        // Parse the template and swap the root element. Scripts inserted via
        // DOMParser/replaceWith are inert per spec — re-create each with
        // createElement so they execute, awaiting onload for src scripts to
        // preserve ordering (React before ReactDOM before Babel before text/babel).
        const doc = new DOMParser().parseFromString(template, 'text/html');
        document.documentElement.replaceWith(doc.documentElement);
        const dead = Array.from(document.scripts);
        for (const old of dead) {
          const s = document.createElement('script');
          for (const a of old.attributes) s.setAttribute(a.name, a.value);
          s.textContent = old.textContent;
          // text/babel scripts with a src: fetch and inline. transformScriptTags
          // does XHR against the src, but blob:null/ from a file:// origin is
          // silently dropped. Inlining makes it a plain inline babel script,
          // which transformScriptTags handles unconditionally.
          if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          }
          const p = s.src ? new Promise(function (r) { s.onload = s.onerror = r; }) : null;
          old.replaceWith(s);
          if (p) await p;
        }
        // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
        // which fired before we swapped the document. Trigger manually if present.
        if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
          window.Babel.transformScriptTags();
        }
      } catch (err) {
        setStatus('Error unpacking: ' + err.message);
        console.error('Bundle unpack error:', err);
      }
    });

  </script>

:0;transform:scale(2.8)}}\n  @keyframes impactFlash{0%{opacity:0;transform:scale(.2)}38%{opacity:.95}100%{opacity:0;transform:scale(1.7)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"position:fixed;inset:0;font-family:'Space Grotesk',system-ui,sans-serif\">\n  <div style=\"position:absolute;inset:0\">{{ scene }}<\u002Fdiv>\n  <button onclick=\"{{ replay }}\" style=\"position:absolute;bottom:22px;right:22px;z-index:2;display:inline-flex;align-items:center;gap:7px;padding:10px 17px;border-radius:999px;border:1.5px solid rgba(255,255,255,.5);background:rgba(255,255,255,.12);backdrop-filter:blur(6px);color:#fff;font:600 14px 'Space Grotesk',sans-serif;cursor:pointer\" style-hover=\"background:rgba(255,255,255,.24)\">↻ Repetir<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#FF8A2B&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#FF8A2B&quot;,&quot;#FF6A00&quot;,&quot;#FFB300&quot;,&quot;#FF4D6D&quot;]},&quot;celeste&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#36AEE7&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#36AEE7&quot;,&quot;#1FA0DC&quot;,&quot;#23C3E8&quot;,&quot;#4FB8E8&quot;]}}\">\nclass Component extends DCLogic {\n  state = { run: 0, settled: false };\n  timer = null;\n\n  componentDidMount() { this.scheduleSettle(); }\n  componentWillUnmount() { clearTimeout(this.timer); }\n\n  scheduleSettle() {\n    clearTimeout(this.timer);\n    this.timer = setTimeout(() => this.setState({ settled: true }), 2500);\n  }\n\n  replay() { this.setState(s => ({ run: s.run + 1, settled: false })); this.scheduleSettle(); }\n\n  buildScene(runId, settled) {\n    const h = React.createElement;\n    const src = (window.__resources && window.__resources.logo) || 'alumni-ucr.png';\n    const accent = this.props.accent || '#FF8A2B';\n    const celeste = this.props.celeste || '#36AEE7';\n    const acc = (a) => `color-mix(in srgb, ${accent} ${a}%, transparent)`;\n    const accLight = `color-mix(in srgb, ${accent}, white 22%)`;\n    const stageBg = `radial-gradient(125% 120% at 50% 40%, color-mix(in srgb, ${celeste}, white 42%) 0%, ${celeste} 52%, color-mix(in srgb, ${celeste}, #00425f 34%) 100%)`;\n    const shadow = 'drop-shadow(0 12px 30px rgba(6,55,85,.32))';\n    const orangeGlow = `drop-shadow(0 0 16px ${acc(50)})`;\n    const rootStyle = { position: 'absolute', inset: 0, overflow: 'hidden', background: stageBg, display: 'flex', alignItems: 'center', justifyContent: 'center', containerType: 'size' };\n    const logo = (style) => h('img', { key: 'img', src, style: { width: '100%', display: 'block', ...style } });\n    const logoW = '34cqmin';\n\n    if (settled) {\n      return h('div', { key: 'settled', style: rootStyle },\n        h('div', { style: { position: 'relative', width: logoW, filter: shadow } }, logo()));\n    }\n\n    const dots = [];\n    for (let i = 0; i < 26; i++) {\n      const a = Math.random() * Math.PI * 2;\n      const d = 26 + Math.random() * 22;\n      const dx = (Math.cos(a) * d).toFixed(1) + 'cqw';\n      const dy = (Math.sin(a) * d).toFixed(1) + 'cqh';\n      const oa = a + (Math.random() - 0.5) * 0.7;\n      const od = d * (1.4 + Math.random() * 0.9);\n      const ox = (Math.cos(oa) * od).toFixed(1) + 'cqw';\n      const oy = (Math.sin(oa) * od).toFixed(1) + 'cqh';\n      const sz = (0.5 + Math.random() * 1.1).toFixed(2) + 'cqmin';\n      const isOrange = i % 4 !== 0;\n      const col = isOrange ? (i % 2 ? accent : `color-mix(in srgb, ${accent}, white 28%)`) : '#ffffff';\n      const delay = (Math.random() * 0.14).toFixed(3);\n      dots.push(h('div', { key: 'd' + i, style: { position: 'absolute', top: '50%', left: '50%', width: sz, height: sz, borderRadius: '50%', background: col, boxShadow: `0 0 10px ${isOrange ? acc(85) : 'rgba(255,255,255,.9)'}`, '--dx': dx, '--dy': dy, '--ox': ox, '--oy': oy, animation: `particleConverge .9s cubic-bezier(.5,0,.5,1) ${delay}s both` } }));\n    }\n    const streaks = [];\n    for (let i = 0; i < 11; i++) {\n      const a = Math.random() * Math.PI * 2;\n      const d = 24 + Math.random() * 20;\n      const dx = (Math.cos(a) * d).toFixed(1) + 'cqw';\n      const dy = (Math.sin(a) * d).toFixed(1) + 'cqh';\n      const od = d * (1.6 + Math.random() * 0.8);\n      const ox = (Math.cos(a) * od).toFixed(1) + 'cqw';\n      const oy = (Math.sin(a) * od).toFixed(1) + 'cqh';\n      const rot = (a * 180 / Math.PI).toFixed(1) + 'deg';\n      const len = (3.5 + Math.random() * 4).toFixed(2) + 'cqmin';\n      const isOrange = i % 3 !== 0;\n      const col = isOrange ? accent : '#ffffff';\n      const delay = (Math.random() * 0.12).toFixed(3);\n      streaks.push(h('div', { key: 's' + i, style: { position: 'absolute', top: '50%', left: '50%', width: len, height: '0.4cqmin', borderRadius: '1cqmin', background: `linear-gradient(90deg, ${isOrange ? acc(0) : 'rgba(255,255,255,0)'}, ${col})`, boxShadow: `0 0 8px ${isOrange ? acc(70) : 'rgba(255,255,255,.8)'}`, '--dx': dx, '--dy': dy, '--ox': ox, '--oy': oy, '--rot': rot, animation: `streakConverge .9s cubic-bezier(.5,0,.5,1) ${delay}s both` } }));\n    }\n\n    return h('div', { key: 'run-' + runId, style: rootStyle }, [\n      h('div', { key: 'rays', style: { position: 'absolute', width: '52%', aspectRatio: '1', borderRadius: '50%', background: `repeating-conic-gradient(from 0deg, ${acc(55)} 0deg 4deg, ${acc(0)} 4deg 16deg)`, mixBlendMode: 'screen', WebkitMaskImage: 'radial-gradient(circle, #000 24%, transparent 64%)', maskImage: 'radial-gradient(circle, #000 24%, transparent 64%)', animation: 'rayBurst .85s ease-out .5s both' } }),\n      h('div', { key: 'shock', style: { position: 'absolute', width: '14%', aspectRatio: '1', borderRadius: '50%', border: `2px solid ${acc(85)}`, animation: 'shockwave .85s cubic-bezier(.15,.7,.3,1) .52s both' } }),\n      ...streaks,\n      ...dots,\n      h('div', { key: 'flash', style: { position: 'absolute', width: '26%', aspectRatio: '1', borderRadius: '50%', background: `radial-gradient(circle, ${accLight} 0%, ${acc(0)} 62%)`, mixBlendMode: 'screen', animation: 'impactFlash .5s ease-out .48s both' } }),\n      h('div', { key: 'wrap', style: { position: 'relative', width: logoW, animation: 'logoSnap 1s cubic-bezier(.18,.85,.25,1) .52s both', filter: shadow + ' ' + orangeGlow } }, logo())\n    ]);\n  }\n\n  renderVals() {\n    const { run, settled } = this.state;\n    return {\n      scene: this.buildScene(run, settled),\n      replay: () => this.replay()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
